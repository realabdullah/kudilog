<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>KudiLog Brand Assets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f0e8;
    min-height: 100vh;
    padding: 40px 24px;
  }
  h1 {
    text-align: center;
    color: #1a3a2a;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
    opacity: 0.5;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 680px;
    margin: 0 auto;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 20px rgba(26,58,42,0.08);
  }
  .card.dark { background: #1a3a2a; }
  .card.black { background: #111; }
  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6bbf4e;
    margin-bottom: 20px;
  }
  .dark .label, .black .label { color: #6bbf4e; opacity: 0.7; }
  .preview {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
  }
  .icon-row {
    display: flex;
    gap: 24px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .size-label {
    font-size: 10px;
    color: #999;
    letter-spacing: 1px;
  }
  .dark .size-label, .black .size-label { color: rgba(255,255,255,0.3); }
  .download-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 32px;
    justify-content: center;
  }
  a.btn {
    display: inline-block;
    padding: 10px 20px;
    background: #1a3a2a;
    color: #6bbf4e;
    border-radius: 8px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  a.btn:hover { background: #6bbf4e; color: #1a3a2a; }
</style>
</head>
