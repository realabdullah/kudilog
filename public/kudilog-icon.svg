<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 150" width="140" height="150">
  <!-- Book body -->
  <rect x="5" y="10" width="130" height="130" rx="12" ry="12" fill="#1a3a2a"/>
  <!-- Book spine -->
  <rect x="5" y="10" width="16" height="130" rx="7" ry="7" fill="#15301f"/>
  <!-- Bookmark -->
  <polygon points="72,10 96,10 96,55 84,46 72,55" fill="#6bbf4e"/>
  <!-- White K stem -->
  <rect x="28" y="44" width="16" height="62" rx="2" fill="white"/>
  <!-- Green K diagonal arms -->
  <polygon points="44,75 82,44 96,44 60,75" fill="#6bbf4e"/>
  <polygon points="44,75 82,106 96,106 60,75" fill="#6bbf4e"/>
  <!-- Book lines -->
  <rect x="24" y="118" width="58" height="6" rx="3" fill="#3a6640" opacity="0.8"/>
  <rect x="24" y="130" width="44" height="6" rx="3" fill="#3a6640" opacity="0.6"/>
</svg>
